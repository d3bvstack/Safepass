name: Build And Release Extensions

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure sync script is executable
        run: chmod +x scripts/sync-extensions.sh

      - name: Sync extension targets from source-of-truth
        run: ./scripts/sync-extensions.sh

      - name: Build release artifacts
        run: |
          set -euo pipefail
          mkdir -p release-artifacts

          SHORT_SHA="${GITHUB_SHA::7}"

          cd build/chrome_extension
          zip -r "../release-artifacts/safepass-chrome-${SHORT_SHA}.zip" .
          cd ..

          cd firefox_extension
          zip -r "../release-artifacts/safepass-firefox-${SHORT_SHA}.xpi" .
          cd ../..

          sha256sum release-artifacts/* > release-artifacts/checksums.txt

      - name: Set release metadata
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG="main-${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
          TITLE="Safepass main build #${GITHUB_RUN_NUMBER} (${SHORT_SHA})"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.title }}
          generate_release_notes: true
          files: |
            release-artifacts/*.zip
            release-artifacts/*.xpi
            release-artifacts/checksums.txt
