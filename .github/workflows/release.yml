name: Build And Release Extensions

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure sync script is executable
        run: chmod +x scripts/sync-extensions.sh

      - name: Sync extension targets from source-of-truth
        run: ./scripts/sync-extensions.sh

      - name: Determine if release is needed
        id: check_version
        run: |
          set -euo pipefail
          # If this run is triggered by a tag push, always release
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "Triggered by tag ${GITHUB_REF#refs/tags/} — will release"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          MANIFEST_VERSION=$(jq -r .version build/chrome_extension/manifest.json)
          echo "Manifest version: ${MANIFEST_VERSION}"

          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)
          if [ -z "${LATEST_TAG}" ]; then
            echo "No existing v* tags found — will release"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LATEST_VERSION=${LATEST_TAG#v}
          echo "Latest tag: ${LATEST_TAG} -> ${LATEST_VERSION}"

          HIGHEST=$(printf '%s\n%s\n' "${MANIFEST_VERSION}" "${LATEST_VERSION}" | sort -V | tail -n1)
          if [ "${HIGHEST}" = "${MANIFEST_VERSION}" ] && [ "${MANIFEST_VERSION}" != "${LATEST_VERSION}" ]; then
            echo "Manifest is newer than latest tag — will release"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "Manifest is not newer than latest tag — skipping release"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release artifacts
        run: |
          set -euo pipefail
          mkdir -p release-artifacts

          FIREFOX_VERSION=$(jq -r .version build/firefox_extension/manifest.json)
          CHROME_VERSION=$(jq -r .version build/chrome_extension/manifest.json)
          echo "Building Chrome v${CHROME_VERSION} and Firefox v${FIREFOX_VERSION} artifacts"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            IDENT="${GITHUB_REF#refs/tags/}"
          else
            IDENT="${GITHUB_SHA::7}"
          fi

          cd build/chrome_extension
          zip -r "${GITHUB_WORKSPACE}/release-artifacts/safepass-chrome-v${CHROME_VERSION}-${IDENT}.zip" .
          cd ..

          cd firefox_extension
          FIREFOX_XPI="${GITHUB_WORKSPACE}/release-artifacts/safepass-firefox-v${FIREFOX_VERSION}-${IDENT}.xpi"
          zip -r "${FIREFOX_XPI}" .

          # Validate the packaged manifest version so AMO uploads cannot silently use stale payloads.
          PACKAGED_FIREFOX_VERSION=$(unzip -p "${FIREFOX_XPI}" manifest.json | jq -r .version)
          if [[ "${PACKAGED_FIREFOX_VERSION}" != "${FIREFOX_VERSION}" ]]; then
            echo "Packaged Firefox manifest version mismatch: expected ${FIREFOX_VERSION}, got ${PACKAGED_FIREFOX_VERSION}" >&2
            exit 1
          fi
          cd ../..

          sha256sum release-artifacts/* > release-artifacts/checksums.txt

      - name: Set release metadata
        if: ${{ steps.check_version.outputs.should_release == 'true' }}
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            TITLE="Safepass ${TAG}"
          else
            TAG="master-${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
            TITLE="Safepass master build #${GITHUB_RUN_NUMBER} (${SHORT_SHA})"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: ${{ steps.check_version.outputs.should_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.title }}
          generate_release_notes: true
          files: |
            release-artifacts/*.zip
            release-artifacts/*.xpi
            release-artifacts/checksums.txt
